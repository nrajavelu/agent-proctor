global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'agent-proctor-services'
    static_configs:
      - targets: 
        - 'ayan-postgres:5432'
        - 'ayan-redis:6379'
        - 'ayan-storage:9000'
    scrape_interval: 30s
    metrics_path: '/metrics'

  # LiveKit monitoring
  - job_name: 'livekit'
    static_configs:
      - targets: ['ayan-livekit:7880']
    scrape_interval: 15s

  # Application services (when running)
  - job_name: 'control-plane'
    static_configs:
      - targets: ['localhost:3001']
    scrape_interval: 30s

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['localhost:8080']
    scrape_interval: 30s

  # AI Services monitoring
  - job_name: 'ai-services'
    static_configs:
      - targets:
        - 'localhost:8001'  # AI Vision
        - 'localhost:8002'  # AI Audio
        - 'localhost:8003'  # AI Behavior
    scrape_interval: 45s