version: '3.8'

services:
  # Core Database
  ayan-postgres:
    image: postgres:16-alpine
    container_name: ayan-postgres
    environment:
      POSTGRES_DB: ayan_db
      POSTGRES_USER: ayan_user
      POSTGRES_PASSWORD: ayan_pass_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ayan_user -d ayan_db"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - ayan-network

  # Redis for caching and sessions
  ayan-redis:
    image: redis:7-alpine
    container_name: ayan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - ayan-network

  # LiveKit media server - working config
  ayan-livekit:
    image: livekit/livekit-server:v1.5.2
    container_name: ayan-livekit
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit-simple.yaml:/livekit.yaml:ro
    command: ["livekit-server", "--config", "/livekit.yaml"]
    depends_on:
      - ayan-redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7880 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - ayan-network

  # MinIO for file storage (recordings, uploads)
  ayan-storage:
    image: minio/minio:latest
    container_name: ayan-storage
    environment:
      MINIO_ROOT_USER: ayan_admin_user
      MINIO_ROOT_PASSWORD: ayan_admin_pass_dev
    ports:
      - "9000:9000"
      - "9090:9090"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - ayan-network

  # MinIO initialization (create buckets)
  ayan-minio-init:
    image: minio/mc:latest
    container_name: ayan-minio-init
    depends_on:
      ayan-storage:
        condition: service_healthy
    volumes:
      - ./scripts/minio-init.sh:/init.sh:ro
    command: sh /init.sh
    networks:
      - ayan-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  ayan-network:
    driver: bridge

# Note: Keycloak disabled due to macOS Docker thread creation issues
# The demo works without SSO authentication